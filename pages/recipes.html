<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes</title>
  <link rel="stylesheet" href="../css/recipes_style.css">
  <link rel="stylesheet" href="../css/universal_style.css">
</head>

<body>
  <div class="inventory">
    <div id="title-and-search">
      <h1>Recipes</h1>

      <div id="search-inventory">
        <input type="text" id="to-search" placeholder="Search">
      </div>
    </div>

    <div id="filter-sort-add">

      <div id="filter-sort">
        <div id="filters">
          <button type="button" id="filter-btn" aria-haspopup="dialog" aria-controls="fadeAndFilterRecipes">
            <span class="filter-btn-text">Filters</span>
            <img src="../assets/svgs/filters-2-svgrepo-com.svg" alt="" width="35" height="20"
              id="filter-symbol">
          </button>
        </div>
        <div id="recipesFilterSummary" class="recipes-filter-summary hidden" aria-live="polite"></div>

        <div id="sort">
          <label for="recipe-sort">Sort by:</label>
          <select id="recipe-sort" name="sort">
            <option value="newer first" selected>newer first</option>
            <option value="older first">older first</option>
            <option value="Name A-Z">Name A-Z</option>
            <option value="Name Z-A">Name Z-A</option>
            <!--<option value="Highest Rated">Highest Rated</option>-->
          </select>
        </div>
      </div><!-- end filter-sort -->

      <div id="add-item">
        <button type="button" id="clearRecipesBtn" class="hidden">Clear</button>
        <button type="button" id="addItemBtn">Add Recipe</button>
      </div>

      <div id="fadeAndAddItem" class="hidden">
        <div class="fade"></div>
        <div class="AddItem">
          <button type="button" id="cancelBtn" class="modal-close-btn" aria-label="Close">X</button>
          <h3><u>Add Recipe</u></h3>
          <form id="addItemForm">
            <div class="add-item-row" style="margin-bottom: 16px;">
              <label for="toAddName">Name:</label>
              <input type="text" id="toAddName" placeholder="required, all other fields optional">
            </div>
            <div class="add-item-row add-item-row-stacked">
              <label for="toAddDescription">Description:</label>
              <textarea id="toAddDescription" rows="3"></textarea>
            </div>
            <div class="add-item-row add-item-row-stacked">
              <label for="toAddIngredients">Ingredients:</label>
              <textarea id="toAddIngredients" rows="3"></textarea>
            </div>
            <div class="add-item-row add-item-row-stacked">
              <label for="toAddSteps">Steps:</label>
              <textarea id="toAddSteps" rows="3"></textarea>
            </div>            
            <div class="add-item-row">
              <label for="toAddRating">Rating<br>(out of 5):</label>
              <input type="number" id="toAddRating" min="0" max="5" step="1">
            </div>
            <br>
            
            <div class="add-item-row add-item-row-stacked checklist-row">
              <span class="checklist-label" id="add-allergens-legend">Allergens:</span>
              <div id="toAddAllergensChecklist" class="checklist-options" role="group" aria-labelledby="add-allergens-legend">
                <label class="checklist-option"><input type="checkbox" value="nuts"> nuts</label>
                <label class="checklist-option"><input type="checkbox" value="dairy"> dairy</label>
                <label class="checklist-option"><input type="checkbox" value="gluten"> gluten</label>
                <label class="checklist-option"><input type="checkbox" value="shellfish"> shellfish</label>
                <label class="checklist-option"><input type="checkbox" value="fish"> fish</label>
                <label class="checklist-option"><input type="checkbox" value="eggs"> eggs</label>
                <label class="checklist-option"><input type="checkbox" value="soybeans"> soybeans</label>
              </div>
            </div>
            <hr>
            <div class="add-item-row add-item-row-stacked checklist-row">
              <span class="checklist-label" id="add-diets-legend">Diets:</span>
              <div id="toAddDietsChecklist" class="checklist-options" role="group" aria-labelledby="add-diets-legend">
                <label class="checklist-option"><input type="checkbox" value="vegetarian"> vegetarian</label>
                <label class="checklist-option"><input type="checkbox" value="vegan"> vegan</label>
                <label class="checklist-option"><input type="checkbox" value="kosher"> Kosher</label>
                <label class="checklist-option"><input type="checkbox" value="halal"> Halal</label>
              </div>
            </div>

            <div class="add-item-actions">
              <button type="button" id="submitBtn">Submit</button>
            </div>
            <div id="require-name-error" class="hidden require-name-error"><em>Recipe name is required before submitting</em></div>
          </form>
        </div>
      </div>

      <div id="fadeAndEditItem" class="hidden">
        <div class="fade"></div>
        <div class="AddItem">
          <button type="button" id="cancelEditBtn" class="modal-close-btn" aria-label="Close">X</button>
          <h3><u>Edit Recipe</u></h3>
          <form id="editItemForm">
            <div class="add-item-row" style="margin-bottom: 16px;">
              <label for="toEditName">Name:</label>
              <input type="text" id="toEditName" placeholder="required, all other fields optional">
            </div>
            <div class="add-item-row add-item-row-stacked">
              <label for="toEditDescription">Description:</label>
              <textarea id="toEditDescription" rows="3"></textarea>
            </div>
            <div class="add-item-row add-item-row-stacked">
              <label for="toEditIngredients">Ingredients:</label>
              <textarea id="toEditIngredients" rows="3"></textarea>
            </div>
            <div class="add-item-row add-item-row-stacked">
              <label for="toEditSteps">Steps:</label>
              <textarea id="toEditSteps" rows="3"></textarea>
            </div>            
            <div class="add-item-row">
              <label for="toEditRating">Rating<br>(out of 5):</label>
              <input type="number" id="toEditRating" min="0" max="5" step="1">
            </div>  
            <br>

            <div class="add-item-row add-item-row-stacked checklist-row">
              <span class="checklist-label" id="edit-allergens-legend">Allergens:</span>
              <div id="toEditAllergensChecklist" class="checklist-options" role="group" aria-labelledby="edit-allergens-legend">
                <label class="checklist-option"><input type="checkbox" value="nuts">   nuts</label>
                <label class="checklist-option"><input type="checkbox" value="dairy"> dairy</label>
                <label class="checklist-option"><input type="checkbox" value="gluten"> gluten</label>
                <label class="checklist-option"><input type="checkbox" value="shellfish"> shellfish</label>
                <label class="checklist-option"><input type="checkbox" value="fish"> fish</label>
                <label class="checklist-option"><input type="checkbox" value="eggs"> eggs</label>
                <label class="checklist-option"><input type="checkbox" value="soybeans"> soybeans</label>
              </div>
            </div>
            <hr>
            <div class="add-item-row add-item-row-stacked checklist-row">
              <span class="checklist-label" id="edit-diets-legend">Diets:</span>
              <div id="toEditDietsChecklist" class="checklist-options" role="group" aria-labelledby="edit-diets-legend">
                <label class="checklist-option"><input type="checkbox" value="vegetarian"> vegetarian</label>
                <label class="checklist-option"><input type="checkbox" value="vegan"> vegan</label>
                <label class="checklist-option"><input type="checkbox" value="kosher"> Kosher</label>
                <label class="checklist-option"><input type="checkbox" value="halal"> Halal</label>
              </div>
            </div>

            <div class="add-item-actions">
              <button type="button" id="cancelEditBtn">Cancel</button>
              <button type="button" id="submitEditBtn">Save</button>
            </div>
            <div id="require-name-error-edit" class="hidden require-name-error"><em>Recipe name is required before saving</em></div>
          </form>
        </div>
      </div>

      <div id="fadeAndFilterRecipes" class="hidden" role="dialog" aria-labelledby="filter-recipes-title" aria-modal="true">
        <div class="fade"></div>
        <div class="AddItem">
          <button type="button" id="recipeFilterModalCancelBtn" class="modal-close-btn" aria-label="Close">X</button>
          <h3 id="filter-recipes-title"><u>Filter Recipes</u></h3>
          <form id="filterRecipeForm">
            <div class="add-item-row add-item-row-stacked checklist-row">
              <span class="checklist-label" id="recipe-filter-allergens-legend">Allergens:</span>
              <div id="filterRecipesAllergensChecklist" class="checklist-options" role="group" aria-labelledby="recipe-filter-allergens-legend">
                <label class="checklist-option"><input type="checkbox" value="nut-free"> nut-free</label>
                <label class="checklist-option"><input type="checkbox" value="dairy-free"> dairy-free</label>
                <label class="checklist-option"><input type="checkbox" value="gluten-free"> gluten-free</label>
                <label class="checklist-option"><input type="checkbox" value="shellfish-free"> shellfish-free</label>
                <label class="checklist-option"><input type="checkbox" value="fish-free"> fish-free</label>
                <label class="checklist-option"><input type="checkbox" value="egg-free"> egg-free</label>
                <label class="checklist-option"><input type="checkbox" value="soy-free"> soy-free</label>
              </div>
            </div>
            <hr>
            <div class="add-item-row add-item-row-stacked checklist-row">
              <span class="checklist-label" id="recipe-filter-diets-legend">Diets:</span>
              <div id="filterRecipesDietsChecklist" class="checklist-options filter-diets-checklist" role="group" aria-labelledby="recipe-filter-diets-legend">
                <label class="checklist-option"><input type="checkbox" value="vegetarian"> vegetarian</label>
                <label class="checklist-option"><input type="checkbox" value="vegan"> vegan</label>
                <label class="checklist-option"><input type="checkbox" value="kosher"> Kosher</label>
                <label class="checklist-option"><input type="checkbox" value="halal"> Halal</label>
              </div>
            </div>
            <br>
            <div class="add-item-actions filter-modal-actions">
              <button type="button" id="recipeFilterModalApplyBtn">Apply</button>
              <button type="button" id="recipeFilterModalClearAllBtn">Clear All</button>
            </div>
            <br>
          </form>
        </div>
      </div>
    </div><!-- end filter-sort-add -->

    <div id="items">
      <table id="items-table">
        <tr>
          <th class="name-cell">Name</th>
          <th class="rating-col">Rating</th>
          <th></th>
        </tr>
      </table>
    </div><!-- end items -->

  </div><!-- end inventory -->

  <div id="navbar" class="fixed-navbar">
    <button class="tablink" onclick="location.href='index.html'" id="defaultOpen">
      <img src="../assets/images/fridge.svg" height="70">
      <span class="tab-label">Inventory</span>
    </button>
    <button class="tablink" onclick="location.href='grocery_list.html'">
      <img src="../assets/images/list.svg" height="70">
      <span class="tab-label">Grocery List</span>
    </button>
    <button class="tablink" onclick="location.href='recipes.html'">
      <img src="../assets/images/recipes.svg" height="70">
      <span class="tab-label current-tab">Recipes</span>
    </button>
    <button class="tablink" onclick="location.href='meals.html'">
      <img src="../assets/images/meals.svg" height="70">
      <span class="tab-label">Meals</span>
    </button>
    <button class="tablink" onclick="location.href='people.html'">
      <img src="../assets/images/people.svg" height="70">
      <span class="tab-label">People</span>
    </button>
  </div>

  <div id="edit-row-tooltip" class="hidden edit-row-tooltip" role="tooltip">click to view or edit recipe</div>

  <script src="../js/recipes.js"></script>
  <script src="../js/universal_script.js"></script>
</body>

</html>
